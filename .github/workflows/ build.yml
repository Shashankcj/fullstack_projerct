name: Genesis Build

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Python Version
        run: |
          python --version
          pip --version

      - name: Create Virtual Environment
        run: |
          cd src/backend
          python -m venv venv

      - name: Install Requirements
        run: |
          cd src/backend
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r src/backend/requirements.txt

      - name: Verify Installed Packages
        run: |
          cd src/backend
          source venv/bin/activate
          pip list
      - name: Build Manage
        run: ./scripts/build_manage.sh

      - name: Build Celery
        run: ./scripts/build_celery.sh

      - name: Copy Migrations
        run: ./scripts/copy_migrations.sh